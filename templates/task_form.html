{% extends "base.html" %}
{% block title %}{{ "업무 수정" if action=="edit" else "업무 추가" }}{% endblock %}
{% block page_title %}{{ "✏️ 업무 수정" if action=="edit" else "➕ 업무 추가" }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
  <div class="card-box">
    <form method="POST" action="{{ '/tasks/'+task.id|string+'/edit' if action=='edit' else '/tasks/add' }}">
      <input type="hidden" name="next" value="{{ request.args.get('next', '/') }}">

      <div class="mb-3">
        <label class="form-label fw6">업무명 *</label>
        <input type="text" name="title" class="form-control" required
               value="{{ task.title if task else '' }}" placeholder="업무 제목을 입력하세요">
      </div>

      <div class="mb-3">
        <label class="form-label fw6">설명</label>
        <textarea name="description" class="form-control" rows="3"
                  placeholder="업무 내용을 자세히 설명해주세요">{{ task.description if task else '' }}</textarea>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-sm-6">
          <label class="form-label fw6">담당자</label>
          <select name="assignee_id" class="form-select">
            <option value="">담당자 미지정</option>
            {% for usr in users %}
            <option value="{{ usr.id }}" {{ 'selected' if task and task.assignee_id==usr.id else '' }}>
              {{ usr.name }} ({{ usr.role }})
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw6">마감일</label>
          <input type="date" name="due_date" class="form-control"
                 value="{{ task.due_date.strftime('%Y-%m-%d') if task and task.due_date else '' }}">
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-sm-6">
          <label class="form-label fw6">우선순위</label>
          <select name="priority" class="form-select">
            <option value="urgent" {{ 'selected' if task and task.priority=='urgent' else '' }}>🔴 긴급</option>
            <option value="high" {{ 'selected' if task and task.priority=='high' else '' }}>🟠 높음</option>
            <option value="medium" {{ 'selected' if not task or task.priority=='medium' else '' }}>🔵 보통</option>
            <option value="low" {{ 'selected' if task and task.priority=='low' else '' }}>🟢 낮음</option>
          </select>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw6">상태</label>
          <select name="status" class="form-select">
            <option value="todo" {{ 'selected' if not task or task.status=='todo' else '' }}>할 일</option>
            <option value="in_progress" {{ 'selected' if task and task.status=='in_progress' else '' }}>진행 중</option>
            <option value="done" {{ 'selected' if task and task.status=='done' else '' }}>완료</option>
          </select>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw6 d-flex justify-content-between">
          진행률 <span id="prog-display">{{ task.progress if task else 0 }}%</span>
        </label>
        <input type="range" name="progress" id="progress" class="form-range"
               min="0" max="100" value="{{ task.progress if task else 0 }}">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary flex-grow-1">
          {{ "💾 저장" if action=="edit" else "➕ 추가" }}
        </button>
        <a href="{{ request.args.get('next', '/') }}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
